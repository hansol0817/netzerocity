<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">

  <title>CARBON COLLAPSE</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="script.js" defer></script>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

  <div class="logo">
    ☣ CARBON COLLAPSE
  </div>

  <div class="stats">

    <div>📅 <span id="yearText">2030</span></div>

    <div>🎮 TURN <span id="turnText">1</span>/10</div>

    <div>☁ 탄소 <span id="carbonText">20</span>%</div>

    <div>😊 행복 <span id="happyText">100</span>%</div>

    <div>⚡ 전력 <span id="powerText">70</span>%</div>

    <div>🏙 수요 <span id="demandText">50</span>%</div>

    <div>💰 <span id="moneyText">700</span>억</div>

  </div>

</div>

<!-- MAIN -->

<div class="main">

  <!-- LEFT -->

  <div class="left-panel">

    <h2>📊 도시 그래프</h2>

    <div class="graph-box">

      <canvas id="chart"></canvas>

    </div>

  </div>

  <!-- CENTER -->

  <div class="center-panel">

    <div class="city-header">

      CITY STATUS :
      <span id="cityState">

        NORMAL

      </span>

    </div>

    <div id="weatherBox">

      ☀ 맑음

    </div>

    <img
      id="cityImage"
      src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df">

    <!-- BIG EVENT -->

    <div id="bigEvent">

      <h1 id="bigEventTitle">

        BREAKING NEWS

      </h1>

      <p id="bigEventDesc">

        정책 효과 발생

      </p>

    </div>

  </div>

  <!-- RIGHT -->

  <div class="right-panel">

    <h2>📰 시민 반응</h2>

    <div id="feed">

      <div class="feed-item">

        🌱 탄소 도시 프로젝트 시작

      </div>

    </div>

  </div>

</div>

<!-- POLICY -->

<div class="card-section">

  <div class="policy-card"
       onclick="selectPolicy('solar', this)">

    <h3>☀ 태양광 발전</h3>

    <p>친환경 에너지 확대</p>

  </div>

  <div class="policy-card"
       onclick="selectPolicy('industry', this)">

    <h3>🏭 산업단지 확대</h3>

    <p>경제 성장 중심 정책</p>

  </div>

  <div class="policy-card"
       onclick="selectPolicy('green', this)">

    <h3>🌳 도시 녹화</h3>

    <p>시민 행복 증가</p>

  </div>

  <div class="policy-card"
       onclick="selectPolicy('nuclear', this)">

    <h3>⚛ 원자력 확대</h3>

    <p>전력 안정 확보</p>

  </div>

</div>

<!-- CONFIRM -->

<div class="confirm-area">

  <div id="selectedPolicyText">

    선택된 정책 없음

  </div>

  <button id="confirmButton">

    정책 확정 ▶

  </button>

</div>

</body>
</html>
