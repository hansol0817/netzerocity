<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">

<title>CARBON COLLAPSE</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="script.js" defer></script>

</head>

<body>

<!-- BACKGROUND EFFECT -->

<div id="screenEffect"></div>

<!-- TOPBAR -->

<header class="topbar">

  <div class="logo">

    ☣ CARBON COLLAPSE

  </div>

  <div class="top-stats">

    <div class="stat">
      📅 YEAR
      <span id="yearText">2030</span>
    </div>

    <div class="stat">
      🎮 TURN
      <span id="turnText">1</span>/10
    </div>

    <div class="stat">
      ☁ 탄소
      <span id="carbonText">20</span>%
    </div>

    <div class="stat">
      😊 행복
      <span id="happyText">100</span>%
    </div>

    <div class="stat">
      ⚡ 전력
      <span id="powerText">70</span>%
    </div>

    <div class="stat">
      💰 예산
      <span id="moneyText">700</span>억
    </div>

  </div>

</header>

<!-- MAIN -->

<div class="main-layout">

  <!-- LEFT -->

  <aside class="left-panel">

    <div class="panel-box">

      <h2>📊 도시 상태</h2>

      <canvas id="mainChart"></canvas>

    </div>

    <div class="panel-box">

      <h2>📰 시민 반응</h2>

      <div id="feed">

        <div class="feed-item">
          🌍 탄소 도시 프로젝트 시작
        </div>

      </div>

    </div>

  </aside>

  <!-- CENTER -->

  <main class="center-panel">

    <!-- CITY -->

    <div class="city-wrapper">

      <div class="city-overlay">

        <div class="city-status">

          CITY STATUS :
          <span id="cityState">

            NORMAL

          </span>

        </div>

        <div class="weather-box" id="weatherBox">

          ☀ 맑음

        </div>

      </div>

      <img
      id="cityImage"
      src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df">

    </div>

    <!-- BREAKING NEWS -->

    <div id="breakingNews">

      <h1 id="newsTitle">

        BREAKING NEWS

      </h1>

      <p id="newsDesc">

        도시 정책 발표

      </p>

    </div>

    <!-- POLICY CARDS -->

      <div class="cards-area" id="cardsArea"></div>

      <!-- JS 생성 -->

    </div>

    <!-- CONFIRM -->

    <div class="confirm-area">

      <div id="selectedCardText">

        선택된 정책 없음

      </div>

      <button id="confirmButton">

        정책 확정 ▶

      </button>

    </div>

  </main>

  <!-- RIGHT -->

  <aside class="right-panel">

    <div class="panel-box">

      <h2>⚠ 랜덤 사건</h2>

      <div id="eventBox">

        폭염 발생 가능성 증가

      </div>

    </div>

    <div class="panel-box">

      <h2>🏛 세력 상태</h2>

      <div class="faction">

        🌱 환경단체

        <div class="bar">
          <div id="ecoBar"></div>
        </div>

      </div>

      <div class="faction">

        🏭 기업

        <div class="bar">
          <div id="corpBar"></div>
        </div>

      </div>

      <div class="faction">

        👨 시민

        <div class="bar">
          <div id="citizenBar"></div>
        </div>

      </div>

    </div>

    <div class="panel-box">

      <h2>🏁 현재 방향</h2>

      <div id="routeText">

        균형 발전 도시

      </div>

    </div>

  </aside>

</div>

<!-- GAME OVER -->

<div id="gameOverScreen">

  <h1 id="gameOverTitle">

    GAME OVER

  </h1>

  <p id="gameOverDesc">

    도시 붕괴

  </p>

  <button onclick="location.reload()">

    다시 시작

  </button>

</div>

</body>
</html>
